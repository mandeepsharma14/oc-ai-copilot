apiVersion: apps/v1
kind: Deployment
metadata:
  name: oc-copilot-frontend
  namespace: production
  labels:
    app: oc-copilot-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oc-copilot-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels:
        app: oc-copilot-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/mandeepsharma14/oc-ai-copilot/frontend:IMAGE_TAG
          ports:
            - containerPort: 3000
          env:
            - name:  NEXT_PUBLIC_API_URL
              value: "https://copilot.owenscorning.com"
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits:   { memory: "512Mi", cpu: "500m" }
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: oc-copilot-frontend-svc
  namespace: production
spec:
  selector:
    app: oc-copilot-frontend
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
